<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="100%">
  <defs>
    <!-- 3D Cylindrical Bamboo Shading (Horizontal Stalks) -->
    <linearGradient id="bambooStalkH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3411" />
      <stop offset="12%" stop-color="#8F6C2A" />
      <stop offset="30%" stop-color="#D5B064" />
      <stop offset="50%" stop-color="#FCE1A6" />
      <stop offset="68%" stop-color="#C5A760" />
      <stop offset="88%" stop-color="#836427" />
      <stop offset="100%" stop-color="#33240A" />
    </linearGradient>

    <!-- 3D Cylindrical Bamboo Shading (Vertical Stalks) -->
    <linearGradient id="bambooStalkV" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A3411" />
      <stop offset="12%" stop-color="#8F6C2A" />
      <stop offset="30%" stop-color="#D5B064" />
      <stop offset="50%" stop-color="#FCE1A6" />
      <stop offset="68%" stop-color="#C5A760" />
      <stop offset="88%" stop-color="#836427" />
      <stop offset="100%" stop-color="#33240A" />
    </linearGradient>

    <!-- Organic Wood Grain Overlay Pattern -->
    <pattern id="woodGrain" width="200" height="30" patternUnits="userSpaceOnUse">
      <line x1="0" y1="5" x2="200" y2="5" stroke="#664C1B" stroke-width="0.5" stroke-dasharray="15, 35, 45, 10" opacity="0.25" />
      <line x1="0" y1="15" x2="200" y2="15" stroke="#523B12" stroke-width="0.75" stroke-dasharray="40, 20, 10, 50" opacity="0.2" />
      <line x1="0" y1="22" x2="200" y2="22" stroke="#664C1B" stroke-width="0.5" stroke-dasharray="5, 15, 60, 20" opacity="0.3" />
    </pattern>

    <!-- Drop Shadows for Real 3D Stalk Overlaps -->
    <filter id="heavyDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Hollow Window Inner Boundary Area -->
  <rect x="42" y="42" width="816" height="396" fill="none" />

  <!-- =========================================================================
       BAMBOO WOOD FRAMING LAYER
       ========================================================================= -->
  <!-- 1. VERTICAL BASE PILLARS (Positioned behind horizontal runners) -->
  <g id="vertical-pillars">
    <!-- Left Stalk -->
    <rect x="30" y="10" width="32" height="460" rx="7" fill="url(#bambooStalkV)" filter="url(#heavyDropShadow)" />
    <rect x="30" y="10" width="32" height="460" fill="url(#woodGrain)" />
    <!-- Right Stalk -->
    <rect x="838" y="10" width="32" height="460" rx="7" fill="url(#bambooStalkV)" filter="url(#heavyDropShadow)" />
    <rect x="838" y="10" width="32" height="460" fill="url(#woodGrain)" />
  </g>

  <!-- 2. FOREGROUND HORIZONTAL RUNNERS (Sits cleanly on top at the intersections) -->
  <g id="horizontal-runners">
    <!-- Top Stalk -->
    <rect x="10" y="26" width="880" height="32" rx="6" fill="url(#bambooStalkH)" filter="url(#heavyDropShadow)" />
    <rect x="10" y="26" width="880" height="32" fill="url(#woodGrain)" />
    <!-- Bottom Stalk -->
    <rect x="10" y="422" width="880" height="32" rx="6" fill="url(#bambooStalkH)" filter="url(#heavyDropShadow)" />
    <rect x="10" y="422" width="880" height="32" fill="url(#woodGrain)" />
  </g>

  <!-- =========================================================================
       VOLUMETRIC NATURAL GROWING JOINTS (NODE RINGS)
       ========================================================================= -->
  <g id="bamboo-nodes" opacity="0.85">
    <!-- Top Stalk Raised Joint Accents -->
    <path d="M220,26 C223,32 223,52 220,58 M480,26 C483,32 483,52 480,58 M720,26 C723,32 723,52 720,58" stroke="#3D290F" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M221,26 C224,32 224,52 221,58 M481,26 C484,32 484,52 481,58 M721,26 C724,32 724,52 721,58" stroke="#FCE1A6" stroke-width="1.5" stroke-linecap="round" fill="none" />
    
    <!-- Bottom Stalk Raised Joint Accents -->
    <path d="M250,422 C253,428 253,448 250,454 M510,422 C513,428 513,448 510,454 M750,422 C753,428 753,448 750,454" stroke="#3D290F" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M251,422 C254,428 254,448 251,454 M511,422 C514,428 514,448 511,454 M751,422 C754,428 754,448 751,454" stroke="#FCE1A6" stroke-width="1.5" stroke-linecap="round" fill="none" />

    <!-- Left Vertical Stalk Raised Joint Accents -->
    <path d="M30,160 C36,163 56,163 62,160 M30,310 C36,313 56,313 62,310" stroke="#3D290F" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M30,161 C36,164 56,164 62,161 M30,311 C36,314 56,314 62,311" stroke="#FCE1A6" stroke-width="1.5" stroke-linecap="round" fill="none" />

    <!-- Right Vertical Stalk Raised Joint Accents -->
    <path d="M838,160 C844,163 864,163 870,160 M838,310 C844,313 864,313 870,310" stroke="#3D290F" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M838,161 C844,164 864,164 870,161 M838,311 C844,314 864,314 870,311" stroke="#FCE1A6" stroke-width="1.5" stroke-linecap="round" fill="none" />
  </g>
</svg>
