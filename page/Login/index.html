<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Araro Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Tajawal:wght@300;400;500;700;800;900&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="body-main auth-page" data-theme="dark" data-lang="en" data-dir="ltr">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand">
                <div class="auth-badge">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Admin Login</h1>
                <p>This project is now static HTML, so server-side Clerk login is disabled.</p>
            </div>

            <div class="auth-alert" role="alert">
                Admin sign-in was removed during the PHP to HTML conversion.
            </div>

            <div class="auth-form" style="display:grid; gap: 1rem;">
                <a class="btn btn-primary" href="/page/AdminDashboard/index.html">Open Dashboard</a>
                <a class="btn btn-secondary" href="/index.html">Back Home</a>
            </div>

            <div class="auth-hint">
                Hidden page. Access it directly by URL.
            </div>
        </section>
    </main>

    <script src="../../assets/js/style.js"></script>
</body>
</html>
