<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KulturaQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Tajawal:wght@300;400;500;700;800;900&family=Fira+Code:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="body-main auth-page" data-lang="en" data-dir="ltr" data-theme="dark">
    <header class="main-header" id="header">
        <nav class="nav-container">
            <div class="nav-brand">
                <div class="brand-logo">
                    <span class="logo-text">KulturaQuest</span>
                </div>
            </div>

            <div class="nav-menu" id="navMenu">
                <a href="/" class="nav-link" data-section="home">
                    <i class="fas fa-home"></i>
                    <span class="nav-text">Home</span>
                </a>
                <a href="/#about" class="nav-link" data-section="about">
                    <i class="fas fa-user"></i>
                    <span class="nav-text">About Us</span>
                </a>
                <a href="/#skills" class="nav-link" data-section="skills">
                    <i class="fas fa-code"></i>
                    <span class="nav-text">Tools</span>
                </a>
                <a href="/page/Assets/index.html" class="nav-link" data-section="projects">
                    <i class="fas fa-rocket"></i>
                    <span class="nav-text">Assets</span>
                </a>
                <a href="/page/Download/index.html" class="nav-link" data-section="download">
                    <i class="fas fa-download"></i>
                    <span class="nav-text">Download</span>
                </a>
                <a href="/#feedback" class="nav-link" data-section="feedback">
                    <i class="fas fa-comments"></i>
                    <span class="nav-text">Feedback</span>
                </a>

                <a href="/page/AdminDashboard/index.html" class="nav-link" id="adminDashboardNavLink" data-section="admin-dashboard" style="display:none;" aria-label="Admin">
                    <i class="fas fa-shield-halved" aria-hidden="true"></i>
                    <span class="nav-text">Admin</span>
                </a>
            </div>

            <div class="nav-controls">

                <button class="menu-toggle" id="menuToggle" title="Toggle Menu" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navMenu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-brand">
                <div class="auth-badge">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Admin Access</h1>
                <p>Sign in with your Appwrite admin account.</p>
            </div>

            <div class="auth-alert" id="authAlert" role="alert" style="display:none;">
                Login failed.
            </div>

            <form id="adminLoginForm" class="auth-form" autocomplete="on">
                <label class="auth-field" for="adminEmail">
                    <span>Email</span>
                    <input id="adminEmail" class="form-input" name="email" type="email" required autocomplete="email">
                </label>

                <label class="auth-field" for="adminPassword">
                    <span>Password</span>
                    <input id="adminPassword" class="form-input" name="password" type="password" required autocomplete="current-password">
                </label>

                <button id="adminLoginButton" class="btn btn-primary auth-button" type="submit">
                    <i class="fas fa-right-to-bracket"></i>
                    <span>Sign in</span>
                </button>

                <a class="btn btn-secondary" href="/">Back Home</a>
            </form>

            <div class="auth-hint">
                Only users listed in the admins table can enter the dashboard.
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@25.0.0"></script>
    <script src="../../assets/js/style.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
